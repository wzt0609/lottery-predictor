name: ✅ 自动校验 V1+V2 (每30分钟)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ 检出代码（含历史数据）
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 恢复历史数据缓存
        uses: actions/cache@v4
        with:
          path: data/
          key: lottery-data-${{ github.run_id }}
          restore-keys: |
            lottery-data-

      - name: 📥 拉取最新预测结果 (V1+V2)
        run: |
          git fetch origin gh-pages
          git checkout origin/gh-pages -- prediction-*.json 2>/dev/null || true
          mkdir -p reports
          mv prediction-*.json reports/ 2>/dev/null || true

      - name: 🔴 V1 开奖校验
        run: python lottery_predictor.py post-draw
        timeout-minutes: 30
        continue-on-error: true

      - name: 🟣 V2 开奖校验 + 约束优化
        run: python lottery_predictor_v2.py post-draw
        timeout-minutes: 30
        continue-on-error: true

      - name: 💾 保存优化结果到主分支
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config.json config_v2.json data/ data_v2/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "自动更新模型参数 V1+V2 $(date +'%Y-%m-%d')"
          git push
