name: 📊 每日预测 (20:00 CST)

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔮 V1 预测（打分法）
        run: python lottery_predictor_v2.py collect || true
        timeout-minutes: 8
        continue-on-error: true

      - name: 🔮 V1 预测（打分法）
        run: python lottery_predictor.py predict
        timeout-minutes: 30

      - name: 🟣 V2 预测（随机采样法）
        run: python lottery_predictor_v2.py predict
        timeout-minutes: 30

      - name: 📄 输出预测结果
        run: |
          echo "## V1 预测完成" >> $GITHUB_STEP_SUMMARY
          cat reports/prediction-*.md >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## V2 预测完成" >> $GITHUB_STEP_SUMMARY
          ls -la reports/ >> $GITHUB_STEP_SUMMARY

      - name: 🚀 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          publish_branch: gh-pages
          keep_files: false
          full_commit_message: "每日预测更新 V1+V2 $(date +'%Y-%m-%d %H:%M')"
